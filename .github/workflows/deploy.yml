name: Deploy Sage Theme + Uploads

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer

      # 4️⃣ Build Sage theme
      - name: Build Sage Theme
        working-directory: wp-content/themes/fly-venture
        run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build

      # 5️⃣ Deploy Theme
      - name: Deploy Theme
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: wp-content/themes/fly-venture/
          server-dir: /wp-content/themes/fly-venture/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github*
            node_modules/**
            tests/**
            .env

      # 6️⃣ Deploy Uploads
      - name: Deploy Uploads
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: wp-content/uploads/
          server-dir: /wp-content/uploads/
          dangerous-clean-slate: false
